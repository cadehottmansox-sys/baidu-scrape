<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SourceFinder — Access</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#030d1a;--blue:#7dd3fc;--blue-dim:#1a6fa4;--border:rgba(125,211,252,.14);--text:#e8f4ff;--text2:#7aa5be;--text3:#2e5870;--green:#4ade80}
    html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;height:100vh}
    canvas{position:fixed;inset:0;z-index:0;pointer-events:none}
    .aurora{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .aurora::before,.aurora::after{content:"";position:absolute;border-radius:50%;filter:blur(80px);opacity:.09;animation:drift 18s ease-in-out infinite}
    .aurora::before{width:600px;height:350px;background:radial-gradient(ellipse,#0ea5e9,#6366f1,transparent);top:-100px;left:-100px}
    .aurora::after{width:500px;height:300px;background:radial-gradient(ellipse,#06b6d4,#8b5cf6,transparent);bottom:-80px;right:-80px;animation-delay:-9s}
    @keyframes drift{0%,100%{transform:translate(0,0)}33%{transform:translate(50px,30px)}66%{transform:translate(-30px,15px)}}

    /* X/Twitter style floating posts */
    .xpost{position:fixed;z-index:1;width:260px;background:rgba(7,20,40,.9);border:1px solid rgba(255,255,255,.08);border-radius:16px;padding:14px;pointer-events:none;backdrop-filter:blur(14px)}
    .xpost-header{display:flex;align-items:center;gap:9px;margin-bottom:10px}
    .xpost-avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
    .xpost-name{font-size:13px;font-weight:700;color:#fff;line-height:1.2}
    .xpost-handle{font-size:12px;color:#536471}
    .xpost-x{margin-left:auto;opacity:.4}
    .xpost-text{font-size:13px;color:#e7e9ea;line-height:1.55;margin-bottom:10px}
    .xpost-text .highlight{color:var(--blue)}
    .xpost-footer{display:flex;align-items:center;gap:16px;color:#536471;font-size:12px}
    .xpost-stat{display:flex;align-items:center;gap:4px}
    .xpost-tag{display:inline-block;font-size:11px;font-weight:600;border-radius:20px;padding:3px 10px;margin-top:8px}
    .xpost-verified{color:#1d9bf0;font-size:11px;margin-left:3px}

    /* Center card */
    .center{position:fixed;z-index:10;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;max-width:390px;padding:0 14px}
    .card{background:rgba(6,18,38,.97);border:1px solid var(--border);border-radius:20px;padding:30px;backdrop-filter:blur(20px)}
    .logo-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
    .logo{font-size:23px;font-weight:800;letter-spacing:-1px;background:linear-gradient(130deg,#e8f4ff,#7dd3fc,#38bdf8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .sub{font-size:12px;color:var(--text2);margin-bottom:16px;line-height:1.5}
    .stats-row{display:flex;gap:8px;margin-bottom:16px}
    .stat-pill{flex:1;text-align:center;background:rgba(125,211,252,.06);border:1px solid rgba(125,211,252,.1);border-radius:8px;padding:7px 4px}
    .stat-num{font-size:15px;font-weight:800;color:var(--blue)}
    .stat-lbl{font-size:9px;color:var(--text3);margin-top:1px}
    .tabs{display:flex;gap:4px;margin-bottom:16px;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:4px}
    .tab{flex:1;height:32px;border:none;border-radius:7px;background:transparent;color:var(--text3);font-size:12px;font-weight:600;font-family:inherit;cursor:pointer;transition:all .18s}
    .tab.active{background:var(--blue-dim);color:var(--text)}
    .panel{display:none}.panel.active{display:block}
    label{display:block;font-size:10px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:var(--text3);margin-bottom:5px}
    input{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:inherit;outline:none;padding:0 12px;height:40px;margin-bottom:10px;transition:border-color .2s}
    textarea{width:100%;background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:9px;color:var(--text);font-size:13px;font-family:inherit;outline:none;padding:9px 12px;height:60px;margin-bottom:10px;resize:none;transition:border-color .2s}
    input:focus,textarea:focus{border-color:rgba(125,211,252,.45)}
    input::placeholder,textarea::placeholder{color:var(--text3)}
    input.err{border-color:rgba(248,113,113,.5)!important}
    .contact-row{display:flex;gap:6px;margin-bottom:10px}
    .contact-row input{margin-bottom:0;flex:1}
    .contact-or{display:flex;align-items:center;color:var(--text3);font-size:10px;font-weight:600;flex-shrink:0;padding-top:11px}
    .btn{width:100%;height:42px;background:var(--blue-dim);border:1px solid rgba(125,211,252,.22);border-radius:9px;color:var(--text);font-size:13px;font-weight:700;font-family:inherit;cursor:pointer;transition:background .18s,transform .1s;margin-top:2px}
    .btn:hover{background:#2596d4}
    .btn:active{transform:scale(.98)}
    .btn:disabled{background:rgba(26,111,164,.22);color:var(--text3);cursor:not-allowed}
    .msg{margin-top:10px;font-size:12px;text-align:center;min-height:16px}
    .msg.success{color:var(--green)}.msg.error{color:#f87171}
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>
  <div class="aurora"></div>

  <div class="center">
    <div class="card">
      <div class="logo-row"><span style="font-size:18px">🔒</span><div class="logo">SourceFinder</div></div>
      <p class="sub">Private Chinese supplier sourcing tool. Request access or login.</p>
      <div class="stats-row">
        <div class="stat-pill"><div class="stat-num">2.4k+</div><div class="stat-lbl">Suppliers found</div></div>
        <div class="stat-pill"><div class="stat-num">840+</div><div class="stat-lbl">WeChats extracted</div></div>
        <div class="stat-pill"><div class="stat-num">98%</div><div class="stat-lbl">Success rate</div></div>
      </div>
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Login</button>
        <button class="tab" onclick="switchTab('request')">Request Access</button>
      </div>
      <div class="panel active" id="panel-login">
        <label>Email</label><input type="email" id="loginEmail" placeholder="you@example.com"/>
        <label>Password</label><input type="password" id="loginPass" placeholder="Your password"/>
        <button class="btn" id="loginBtn" onclick="doLogin()">Login</button>
        <p class="msg" id="loginMsg"></p>
      </div>
      <div class="panel" id="panel-request">
        <label>Full name</label><input type="text" id="reqName" placeholder="John Smith"/>
        <label>Email</label><input type="email" id="reqEmail" placeholder="you@example.com"/>
        <label>Discord or WeChat <span style="color:#f87171;font-size:10px;font-weight:400;text-transform:none;letter-spacing:0">(required — how we send your password)</span></label>
        <div class="contact-row">
          <input type="text" id="reqDiscord" placeholder="Discord username"/>
          <span class="contact-or">or</span>
          <input type="text" id="reqWechat" placeholder="WeChat ID"/>
        </div>
        <label style="margin-top:0">How will you use this? <span style="color:var(--text3);font-weight:400;text-transform:none;letter-spacing:0;font-size:10px">(optional)</span></label>
        <textarea id="reqUseCase" placeholder="Sourcing sneakers, clothing, electronics..."></textarea>
        <button class="btn" id="reqBtn" onclick="doRequest()">Request Access</button>
        <p class="msg" id="reqMsg"></p>
      </div>
    </div>
  </div>

  <script>
  // Particles
  (function(){
    const c=document.getElementById("bg-canvas"),ctx=c.getContext("2d");
    let W,H,dots=[],mouse={x:-999,y:-999};
    const resize=()=>{W=c.width=window.innerWidth;H=c.height=window.innerHeight};
    const mk=()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,a:Math.random()*.38+.07});
    const init=()=>{resize();dots=Array.from({length:100},mk)};
    const frame=()=>{
      ctx.clearRect(0,0,W,H);
      for(const d of dots){
        const dx=d.x-mouse.x,dy=d.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<100){d.vx+=(dx/dist)*.35;d.vy+=(dy/dist)*.35}
        d.vx*=.98;d.vy*=.98;d.x+=d.vx;d.y+=d.vy;
        if(d.x<-4)d.x=W+4;else if(d.x>W+4)d.x=-4;
        if(d.y<-4)d.y=H+4;else if(d.y>H+4)d.y=-4;
        ctx.beginPath();ctx.arc(d.x,d.y,d.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,220,255,${d.a})`;ctx.fill();
      }
      for(let i=0;i<dots.length;i++)for(let j=i+1;j<dots.length;j++){
        const a=dots[i],b=dots[j],dx=a.x-b.x,dy=a.y-b.y,dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<90){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(80,170,230,${.07*(1-dist/90)})`;ctx.lineWidth=.5;ctx.stroke()}
      }
      requestAnimationFrame(frame);
    };
    window.addEventListener("mousemove",e=>{mouse.x=e.clientX;mouse.y=e.clientY});
    init();frame();window.addEventListener("resize",resize);
  })();

  // X/Twitter style floating posts
  const POSTS=[
    {name:"Marcus King",handle:"marcusk_resell",initials:"MK",color:"#1d9bf0",bg:"rgba(29,155,240,.2)",verified:true,text:'Found a Jordan 4 factory with <span class="highlight">NFC chips</span> in 10 minutes. Used to spend hours on WeChat groups. This thing is actually insane 🔥',tag:"Passing / NFC",tagColor:"#a78bfa",tagBg:"rgba(167,139,250,.12)",likes:"847",reposts:"234",replies:"91"},
    {name:"Tyler Lim",handle:"tyler_drip",initials:"TL",color:"#a78bfa",bg:"rgba(167,139,250,.2)",verified:false,text:'<span class="highlight">Deep scan OCR</span> pulled a WeChat ID straight from an image on the product page. Contacted the supplier same day. Wild fr 👀',tag:"OCR Scanner",tagColor:"#2dd4bf",tagBg:"rgba(45,212,191,.12)",likes:"1.2k",reposts:"389",replies:"145"},
    {name:"Alex Jensen",handle:"alexj_imports",initials:"AJ",color:"#4ade80",bg:"rgba(74,222,128,.2)",verified:true,text:'FF tab got me a freight forwarder from <span class="highlight">Guangzhou to LA</span> for way cheaper than what I was paying. Already shipped 3 orders through them no cap',tag:"Freight Forwarder",tagColor:"#4ade80",tagBg:"rgba(74,222,128,.12)",likes:"2.1k",reposts:"567",replies:"203"},
    {name:"Ryan Wu",handle:"ryanw_fits",initials:"RW",color:"#fbbf24",bg:"rgba(251,191,36,.2)",verified:false,text:'Smart refresh is underrated. Hit it 3 times on <span class="highlight">Xianyu mode</span>, ended up with 30+ different suppliers. Found my main plug on the 2nd refresh 🙌',tag:"Smart Refresh",tagColor:"#fbbf24",tagBg:"rgba(251,191,36,.12)",likes:"934",reposts:"278",replies:"88"},
    {name:"Sophie Kim",handle:"sophiek_source",initials:"SK",color:"#2dd4bf",bg:"rgba(45,212,191,.2)",verified:true,text:'QR code scanner actually decoded a WeChat QR from a product banner image on the <span class="highlight">first try</span>. I was fully skeptical until it worked lmao',tag:"QR Decoder",tagColor:"#7dd3fc",tagBg:"rgba(125,211,252,.12)",likes:"1.8k",reposts:"445",replies:"167"},
    {name:"Dev Mehta",handle:"devm_wholesale",initials:"DM",color:"#f87171",bg:"rgba(248,113,113,.2)",verified:false,text:'Searched <span class="highlight">Xiaohongshu mode</span> for luxury bag factories. Got 8 verified WeChat contacts in one search. This is the plug for sourcing, no debate',tag:"Xiaohongshu",tagColor:"#f87171",tagBg:"rgba(248,113,113,.12)",likes:"3.4k",reposts:"891",replies:"312"},
    {name:"Jamie Torres",handle:"jamiet_resell",initials:"JT",color:"#38bdf8",bg:"rgba(56,189,248,.2)",verified:true,text:'The confidence scores are legit. Every <span class="highlight">green checkmark WeChat</span> I\'ve hit up has been a real factory contact. Like 10/10 accuracy for me',tag:"WeChat Scoring",tagColor:"#38bdf8",tagBg:"rgba(56,189,248,.12)",likes:"654",reposts:"189",replies:"72"},
    {name:"Chris Vo",handle:"chrisv_source",initials:"CV",color:"#c084fc",bg:"rgba(192,132,252,.2)",verified:false,text:'Xianyu mode is a goldmine. Found <span class="highlight">Dunk samples</span> for basically nothing through here. Factory overstock listings go crazy if you know where to look',tag:"Xianyu",tagColor:"#c084fc",tagBg:"rgba(192,132,252,.12)",likes:"1.1k",reposts:"334",replies:"128"},
  ];

  const CW=260,CH=170;
  const floaters=POSTS.map(p=>{
    const x=Math.random()*(window.innerWidth-CW);
    const y=Math.random()*(window.innerHeight-CH);
    const angle=Math.random()*Math.PI*2;
    const speed=0.15+Math.random()*0.15;
    const el=document.createElement("div");
    el.className="xpost";
    el.innerHTML=`
      <div class="xpost-header">
        <div class="xpost-avatar" style="background:${p.bg};color:${p.color}">${p.initials}</div>
        <div>
          <div class="xpost-name">${p.name}${p.verified?'<span class="xpost-verified">✓</span>':''}</div>
          <div class="xpost-handle">@${p.handle}</div>
        </div>
        <div class="xpost-x"><svg width="16" height="16" viewBox="0 0 24 24" fill="rgba(255,255,255,.3)"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.74l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg></div>
      </div>
      <div class="xpost-text">${p.text}</div>
      <span class="xpost-tag" style="color:${p.tagColor};background:${p.tagBg};border:1px solid ${p.tagColor}33">${p.tag}</span>
      <div class="xpost-footer" style="margin-top:10px">
        <span class="xpost-stat"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" stroke="currentColor" stroke-width="1.5"/></svg>${p.replies}</span>
        <span class="xpost-stat"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M17 1l4 4-4 4M3 11V9a4 4 0 014-4h14M7 23l-4-4 4-4M21 13v2a4 4 0 01-4 4H3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>${p.reposts}</span>
        <span class="xpost-stat"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z" stroke="currentColor" stroke-width="1.5"/></svg>${p.likes}</span>
      </div>`;
    document.body.appendChild(el);
    return {el,x,y,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed};
  });

  function animatePosts(){
    const W=window.innerWidth,H=window.innerHeight;
    const cx=W/2,cy=H/2,zx=cx-210,zy=cy-260,zw=420,zh=520;
    floaters.forEach(f=>{
      f.x+=f.vx;f.y+=f.vy;
      if(f.x<=0){f.x=0;f.vx=Math.abs(f.vx)}
      if(f.x+CW>=W){f.x=W-CW;f.vx=-Math.abs(f.vx)}
      if(f.y<=0){f.y=0;f.vy=Math.abs(f.vy)}
      if(f.y+CH>=H){f.y=H-CH;f.vy=-Math.abs(f.vy)}
      const fcx=f.x+CW/2,fcy=f.y+CH/2;
      const dx=fcx-(zx+zw/2),dy=fcy-(zy+zh/2);
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<360){const force=(360-dist)/360*.022;f.vx+=(dx/dist)*force;f.vy+=(dy/dist)*force}
      const spd=Math.sqrt(f.vx*f.vx+f.vy*f.vy);
      if(spd>.45){f.vx=f.vx/spd*.45;f.vy=f.vy/spd*.45}
      f.el.style.left=f.x+"px";f.el.style.top=f.y+"px";
    });
    requestAnimationFrame(animatePosts);
  }
  animatePosts();

  function switchTab(tab){
    document.querySelectorAll(".tab").forEach((t,i)=>t.classList.toggle("active",(i===0&&tab==="login")||(i===1&&tab==="request")));
    document.getElementById("panel-login").classList.toggle("active",tab==="login");
    document.getElementById("panel-request").classList.toggle("active",tab==="request");
  }

  async function doLogin(){
    const btn=document.getElementById("loginBtn"),msg=document.getElementById("loginMsg");
    const email=document.getElementById("loginEmail").value.trim();
    const password=document.getElementById("loginPass").value.trim();
    if(!email||!password){msg.className="msg error";msg.textContent="Enter email and password.";return}
    btn.disabled=true;btn.textContent="Logging in...";msg.className="msg";msg.textContent="";
    try{
      const r=await fetch("/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password})});
      const data=await r.json();
      if(r.ok){msg.className="msg success";msg.textContent="Welcome! Loading...";setTimeout(()=>location.reload(),700)}
      else{msg.className="msg error";msg.textContent=data.error||"Invalid credentials.";btn.disabled=false;btn.textContent="Login"}
    }catch{msg.className="msg error";msg.textContent="Network error.";btn.disabled=false;btn.textContent="Login"}
  }

  async function doRequest(){
    const btn=document.getElementById("reqBtn"),msg=document.getElementById("reqMsg");
    const name=document.getElementById("reqName").value.trim();
    const email=document.getElementById("reqEmail").value.trim();
    const discord=document.getElementById("reqDiscord").value.trim();
    const wechat=document.getElementById("reqWechat").value.trim();
    const usecase=document.getElementById("reqUseCase").value.trim();
    if(!name){msg.className="msg error";msg.textContent="Please enter your name.";return}
    if(!email){msg.className="msg error";msg.textContent="Please enter your email.";return}
    if(!discord&&!wechat){
      document.getElementById("reqDiscord").classList.add("err");
      document.getElementById("reqWechat").classList.add("err");
      msg.className="msg error";msg.textContent="Enter Discord or WeChat — we need this to send your password.";return
    }
    document.getElementById("reqDiscord").classList.remove("err");
    document.getElementById("reqWechat").classList.remove("err");
    btn.disabled=true;btn.textContent="Sending...";msg.className="msg";msg.textContent="";
    try{
      const r=await fetch("/request-access",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({name,email,discord,wechat,reason:usecase})});
      const data=await r.json();
      if(data.status==="submitted"){msg.className="msg success";msg.textContent="Sent! We'll message you on Discord or WeChat with your password.";btn.textContent="Sent ✓"}
      else if(data.status==="already_requested"){msg.className="msg";msg.textContent="Already requested — sit tight!";btn.disabled=false;btn.textContent="Request Access"}
      else if(data.status==="already_approved"){msg.className="msg success";msg.textContent="You're approved! Use the Login tab.";btn.textContent="Already approved ✓"}
      else{msg.className="msg error";msg.textContent=data.error||"Error.";btn.disabled=false;btn.textContent="Request Access"}
    }catch{msg.className="msg error";msg.textContent="Network error.";btn.disabled=false;btn.textContent="Request Access"}
  }
  document.addEventListener("keydown",e=>{if(e.key==="Enter"&&document.getElementById("panel-login").classList.contains("active"))doLogin()});
  </script>
</body>
</html>
