<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SourceFinder Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--bg:#030d1a;--blue:#7dd3fc;--blue-dim:#1a6fa4;--border:rgba(125,211,252,.14);--surface:rgba(7,20,40,.92);--text:#e8f4ff;--text2:#7aa5be;--text3:#2e5870;--green:#4ade80;--red:#f87171;--amber:#fbbf24}
    html,body{min-height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);padding:32px 20px}
    h1{font-size:24px;font-weight:800;color:var(--blue);margin-bottom:4px}
    .sub{font-size:13px;color:var(--text3);margin-bottom:32px}
    h2{font-size:15px;font-weight:700;color:var(--text2);margin-bottom:12px;margin-top:32px;letter-spacing:.3px}
    .table{width:100%;border-collapse:collapse;font-size:13px}
    .table th{text-align:left;padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--text3);border-bottom:1px solid var(--border)}
    .table td{padding:10px 12px;border-bottom:1px solid rgba(125,211,252,.06);vertical-align:top}
    .table tr:hover td{background:rgba(125,211,252,.03)}
    .badge{font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;display:inline-block}
    .badge-pending{color:var(--amber);background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.2)}
    .badge-approved{color:var(--green);background:rgba(74,222,128,.1);border:1px solid rgba(74,222,128,.2)}
    .badge-denied{color:var(--red);background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.2)}
    .btn-sm{font-size:11px;font-weight:600;font-family:inherit;border-radius:6px;padding:4px 10px;cursor:pointer;border:1px solid;transition:all .15s;text-decoration:none;display:inline-block}
    .btn-approve{color:var(--green);background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.22)}
    .btn-approve:hover{background:rgba(74,222,128,.2)}
    .btn-deny{color:var(--red);background:rgba(248,113,113,.1);border-color:rgba(248,113,113,.22)}
    .btn-deny:hover{background:rgba(248,113,113,.2)}
    .btn-revoke{color:var(--text3);background:rgba(255,255,255,.04);border-color:var(--border)}
    .btn-revoke:hover{color:var(--red);border-color:rgba(248,113,113,.22)}
    .ip{font-family:monospace;font-size:11px;color:var(--text3)}
    .empty{color:var(--text3);font-size:13px;padding:20px 0}
    .wrap{max-width:1000px;margin:0 auto}
    .stat-row{display:flex;gap:16px;margin-bottom:24px}
    .stat{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px 20px;flex:1}
    .stat-num{font-size:28px;font-weight:800;color:var(--blue)}
    .stat-label{font-size:11px;color:var(--text3);margin-top:2px}
  </style>
</head>
<body>
<div class="wrap">
  <h1>SourceFinder Admin</h1>
  <p class="sub">Access request dashboard</p>

  <div class="stat-row" id="stats">
    <div class="stat"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat"><div class="stat-num" id="statApproved">—</div><div class="stat-label">Approved</div></div>
    <div class="stat"><div class="stat-num" id="statDenied">—</div><div class="stat-label">Denied</div></div>
  </div>

  <h2>Pending Requests</h2>
  <table class="table"><thead><tr><th>Name</th><th>Email</th><th>IP</th><th>Reason</th><th>Time</th><th>Actions</th></tr></thead>
  <tbody id="pendingTbl"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody></table>

  <h2>Approved Users</h2>
  <table class="table"><thead><tr><th>Name</th><th>Email</th><th>IP History</th><th>Approved</th><th>Last Login</th><th>Actions</th></tr></thead>
  <tbody id="approvedTbl"><tr><td colspan="6" class="empty">Loading...</td></tr></tbody></table>

  <h2>Denied</h2>
  <table class="table"><thead><tr><th>Name</th><th>Email</th><th>IP</th><th>Time</th></tr></thead>
  <tbody id="deniedTbl"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody></table>
</div>

<script>
  const secret = "{{ secret }}";
  const fmt = ts => ts ? new Date(ts*1000).toLocaleString() : "Never";

  async function load(){
    const r = await fetch(`/admin/data?secret=${secret}`);
    const data = await r.json();
    const requests = data.requests || [], approved = data.approved || [];
    const pending = requests.filter(r=>r.status==="pending");
    const denied  = requests.filter(r=>r.status==="denied");

    document.getElementById("statPending").textContent  = pending.length;
    document.getElementById("statApproved").textContent = approved.length;
    document.getElementById("statDenied").textContent   = denied.length;

    // Pending
    const pTbl = document.getElementById("pendingTbl");
    pTbl.innerHTML = pending.length ? pending.map(r=>`
      <tr>
        <td style="font-weight:600">${r.name}</td>
        <td>${r.email}</td>
        <td class="ip">${r.ip}</td>
        <td style="max-width:220px;color:#7aa5be">${r.reason||"—"}</td>
        <td style="white-space:nowrap;color:#2e5870">${fmt(r.timestamp)}</td>
        <td style="display:flex;gap:6px">
          <a class="btn-sm btn-approve" href="/admin/approve/${r.id}?secret=${secret}" target="_blank">Approve</a>
          <a class="btn-sm btn-deny" href="/admin/deny/${r.id}?secret=${secret}" target="_blank">Deny</a>
        </td>
      </tr>`).join("") : `<tr><td colspan="6" class="empty">No pending requests.</td></tr>`;

    // Approved
    const aTbl = document.getElementById("approvedTbl");
    aTbl.innerHTML = approved.length ? approved.map(u=>`
      <tr>
        <td style="font-weight:600">${u.name}</td>
        <td>${u.email}</td>
        <td class="ip">${(u.ip_history||[]).join("<br>")}</td>
        <td style="white-space:nowrap;color:#2e5870">${fmt(u.approved_at)}</td>
        <td style="white-space:nowrap;color:#2e5870">${fmt(u.last_login)}</td>
        <td><button class="btn-sm btn-revoke" onclick="revoke('${u.email}')">Revoke</button></td>
      </tr>`).join("") : `<tr><td colspan="6" class="empty">No approved users.</td></tr>`;

    // Denied
    const dTbl = document.getElementById("deniedTbl");
    dTbl.innerHTML = denied.length ? denied.map(r=>`
      <tr>
        <td style="font-weight:600">${r.name}</td>
        <td>${r.email}</td>
        <td class="ip">${r.ip}</td>
        <td style="white-space:nowrap;color:#2e5870">${fmt(r.timestamp)}</td>
      </tr>`).join("") : `<tr><td colspan="4" class="empty">None.</td></tr>`;
  }

  async function revoke(email){
    if(!confirm(`Revoke access for ${email}?`)) return;
    await fetch(`/admin/revoke?secret=${secret}`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email})});
    load();
  }

  load();
  setInterval(load, 15000); // auto refresh every 15s
</script>
</body>
</html>
