<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SOURCEFINDER — Factory WeChat Sourcing</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
</head>
<body>
    <div style="position: relative; z-index: 1; max-width: 1400px; margin: 0 auto; padding: 20px;">
        
        <!-- Header -->
        <div class="glass-card" style="padding: 20px 28px; margin-bottom: 28px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h1 style="font-size: 28px; font-weight: 800; background: linear-gradient(135deg, #00f5ff, #7c3aed); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">
                    SOURCEFINDER
                </h1>
                <p style="color: #475569; font-size: 12px; margin-top: 4px;">Factory WeChat Extraction · 1688 API · Smart Search</p>
            </div>
            <div style="display: flex; gap: 12px; align-items: center;">
                <span id="userName" style="color: #00f5ff; font-weight: 600;">Loading...</span>
                <button onclick="fetch('/logout', {method:'POST'}).then(()=>location.reload())" class="btn-neon" style="padding: 8px 20px;">Logout</button>
            </div>
        </div>
        
        <!-- Search Card -->
        <div class="glass-card" style="padding: 28px; margin-bottom: 24px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr auto; gap: 16px; align-items: end; flex-wrap: wrap;">
                <div>
                    <label style="color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px;">BRAND (OPTIONAL)</label>
                    <input type="text" id="brandInput" class="input-neon" placeholder="Nike, Jordan, LV..." style="width: 100%;">
                </div>
                <div>
                    <label style="color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px;">PRODUCT / KEYWORD</label>
                    <input type="text" id="queryInput" class="input-neon" placeholder="Tech Fleece, Jordan 4, Dunk Low..." style="width: 100%;">
                </div>
                <div>
                    <label style="color: #475569; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 6px;">MODE</label>
                    <select id="modeSelect" class="input-neon" style="cursor: pointer;">
                        <option value="passing">🔥 PASSING / NFC</option>
                        <option value="supplier">🏭 FACTORY SUPPLIER</option>
                        <option value="batch">📦 BATCH COMPARE</option>
                        <option value="ff">✈️ FREIGHT</option>
                    </select>
                </div>
                <button id="searchBtn" class="btn-neon" style="padding: 14px 32px; font-size: 16px;">🔍 SEARCH</button>
            </div>
            <div style="margin-top: 16px; display: flex; gap: 12px; flex-wrap: wrap;">
                <span style="color: #475569; font-size: 12px;">🔥 Trending:</span>
                <button onclick="document.getElementById('queryInput').value='Tech Fleece'; document.getElementById('brandInput').value='Nike'; document.getElementById('searchBtn').click()" style="background: none; border: 1px solid rgba(0, 245, 255, 0.2); color: #94a3b8; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;">Nike Tech Fleece</button>
                <button onclick="document.getElementById('queryInput').value='Jordan 4'; document.getElementById('brandInput').value=''; document.getElementById('searchBtn').click()" style="background: none; border: 1px solid rgba(0, 245, 255, 0.2); color: #94a3b8; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;">Jordan 4</button>
                <button onclick="document.getElementById('queryInput').value='Yeezy 350'; document.getElementById('brandInput').value=''; document.getElementById('searchBtn').click()" style="background: none; border: 1px solid rgba(0, 245, 255, 0.2); color: #94a3b8; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;">Yeezy 350</button>
                <button onclick="document.getElementById('queryInput').value='LV Belt'; document.getElementById('brandInput').value=''; document.getElementById('searchBtn').click()" style="background: none; border: 1px solid rgba(0, 245, 255, 0.2); color: #94a3b8; padding: 6px 14px; border-radius: 20px; cursor: pointer; font-size: 12px;">LV Belt</button>
            </div>
        </div>
        
        <!-- Stats Bar -->
        <div id="statsContainer"></div>
        
        <!-- Results -->
        <div id="resultsContainer" style="display: flex; flex-direction: column; gap: 16px;"></div>
        
        <!-- Footer -->
        <div style="text-align: center; padding: 40px 20px; color: #2d3748; font-size: 12px; border-top: 1px solid rgba(0, 245, 255, 0.1); margin-top: 40px;">
            SOURCEFINDER · Factory Direct Sourcing · WeChat IDs Extracted in Real Time
        </div>
        
    </div>
    
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
